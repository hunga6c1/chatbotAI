<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Vinh Long Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
      background: transparent;
      overflow: hidden; /* Ẩn cuộn body, chỉ dùng overlay */
      height: 100vh;
    }
    /* Nút chat nổi */
    .chat-fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 65px;
      height: 65px;
      background: #0b5e3c;
      color: white;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      z-index: 9999;
      transition: transform 0.3s, background 0.3s;
    }
    .chat-fab:hover {
      background: #094a2f;
      transform: scale(1.1);
    }
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .overlay.show { display: flex; }
    /* ... (phần style popup giữ nguyên như code trước) */
  </style>
</head>
<body>
  <!-- Nút chat nổi -->
  <button class="chat-fab" id="openChatBtn" onclick="toggleChat(true)">💬</button>

  <!-- Overlay + popup (giữ nguyên cấu trúc như code trước đây) -->
  <!-- ... -->

    // ... toàn bộ script tương tác giữ nguyên
  </script>
</body>
</html>
